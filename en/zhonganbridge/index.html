    <li><a href="/activities/" id="nav-activities">科普活动</a></li>
  </ul>
  <div class="nav-actions">
    <div class="lang-switch" aria-label="语言切换">
      <a class="lang-link active" href="/" data-lang="zh">中</a>
      <a class="lang-link" href="/en/" data-lang="en">EN</a>

    <div class="hamburger" id="hamburger" onclick="toggleMenu()">
      <span></span><span></span><span></span>

<div id="mobile-menu">
  <div class="mobile-lang-switch">
    <a class="lang-link active" href="/" data-lang="zh">中文</a>
    <a class="lang-link" href="/en/" data-lang="en">English</a>
  </div>
  <a href="/" class="mobile-route" data-route="home">首页</a>

  <a href="/activities/" class="mobile-route" data-route="activities">科普活动</a>
</div>

<main class="project-shell">
  <section class="project-hero-section">
    <div class="project-hero-wrap">
      <div class="project-copy-card">
        <div class="project-breadcrumb" id="project-breadcrumb"></div>
        <div class="project-kicker" id="project-kicker">Project</div>
        <h1 class="project-title" id="project-title"></h1>
        <p class="project-subtitle" id="project-subtitle"></p>
        <p class="project-summary" id="project-summary"></p>
        <div class="project-actions">
          <a class="project-button primary" id="project-back-link" href="/works/">返回作品集</a>
          <a class="project-button secondary" id="project-lang-link" href="/en/stonehouse/">English Version</a>
        </div>
      </div>
      <div class="project-image-card">
        <div class="project-image-frame">
          <img id="project-preview" src="" alt="">
        </div>
      </div>
    </div>
  </section>

  <section class="project-detail-section">
    <div class="project-detail-wrap">
      <aside class="project-summary-card">
        <h2>Project Overview</h2>
        <ul>
          <li>
            <span class="project-meta-label" id="project-category-label">类别</span>
            <span class="project-meta-value" id="project-category-value"></span>
          </li>
          <li>
            <span class="project-meta-label" id="project-medium-label">形式</span>
            <span class="project-meta-value" id="project-medium-value"></span>
          </li>
          <li>
            <span class="project-meta-label" id="project-series-label">归档</span>
            <span class="project-meta-value" id="project-series-value"></span>
          </li>
        </ul>
      </aside>
      <section class="project-plate-card">
        <div class="project-plate-head">
          <div>
            <h2 id="project-image-heading">项目图版</h2>
          </div>
          <p id="project-image-note"></p>
        </div>
        <div class="project-plate">
          <img id="project-image" src="" alt="">
        </div>
      </section>
    </div>
  </section>

  <section class="project-pager" id="project-pager"></section>
</main>

<footer class="site-footer">
